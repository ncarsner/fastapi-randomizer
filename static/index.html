<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizer API</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8E%B2%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1>Randomizer API</h1>
            <div class="theme-toggle-container">
                <label class="theme-switch">
                    <input type="checkbox" id="themeToggle" onchange="toggleTheme()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="grid">
            <!-- Random Number Generator -->
            <div class="card">
                <h2>🎯 Random Number (1 to Max)</h2>
                <div class="input-group">
                    <label for="maxValue">Maximum Value:</label>
                    <input type="number" id="maxValue" value="100" min="1">
                </div>
                <button onclick="getRandomNumber()">Generate Random Number</button>
                <div id="randomResult" class="result"></div>
            </div>

            <!-- Random Number Between -->
            <div class="card">
                <h2>📊 Random Number Between</h2>
                <div style="display: flex; gap: 10px;">
                    <div class="input-group" style="flex: 1;">
                        <label for="minValue">Minimum:</label>
                        <input type="number" id="minValue" value="1" min="1" max="1000000">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label for="maxValueBetween">Maximum:</label>
                        <input type="number" id="maxValueBetween" value="99" min="1" max="1000000">
                    </div>
                </div>
                <button onclick="getRandomBetween()">Generate Random Number</button>
                <div id="randomBetweenResult" class="result"></div>
            </div>

            <!-- Add Item -->
            <div class="card">
                <h2>📋 Add New Items</h2>
                <div class="input-group">
                    <label for="itemName">Item Name(s):</label>
                    <input type="text" id="itemName" placeholder="Enter item(s), separate with commas" maxlength="500">
                </div>
                <p style="color: var(--text-muted); font-size: 12px; margin-top: -8px; margin-bottom: 12px;">Add single item or multiple items separated by commas</p>
                <button onclick="addItem()">Add Item(s)</button>
                <div id="addItemResult" class="result"></div>
            </div>
        </div>

        <!-- Quick Add Presets -->
        <div class="card">
            <h2>⚡ Quick Add Presets</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 13px; line-height: 1.5;">Populate your list with pre-configured item sets</p>
            <div class="preset-buttons">
                <button onclick="addPresetList('names')">👥 Names</button>
                <button onclick="addPresetList('phonetic')">📻 Phonetic</button>
                <button onclick="addPresetList('flavors')">🍎 Flavors</button>
                <button onclick="addPresetList('colors')">🎨 Colors</button>
                <button onclick="addPresetList('planets')">🪐 Planets</button>
                <button onclick="addPresetList('animals')">🐶 Animals</button>
                <button onclick="addPresetList('months')">📅 Months</button>
                <button onclick="addPresetList('weekdays')">📆 Weekdays</button>
                <button onclick="addPresetList('states')">🗺️ US States</button>
                <button onclick="addPresetList('countries')">🌍 Countries</button>
                <!-- <button onclick="addPresetList('languages')">💻 Languages</button> -->
                <button onclick="addPresetList('zodiac')">♈ Zodiac</button>
                <button onclick="addPresetList('emojis')">😄 Emojis</button>
            </div>
            <div id="presetResult" class="result" style="display: none;"></div>
        </div>

        <!-- Items Management -->
        <div class="card">
            <h2>📋 Items Management</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 16px;">
                <button class="btn-pick" onclick="pickRandomItem()" style="flex: 1; margin-top: 0;">🎯 Pick Random</button>
                <button class="btn-shuffle" onclick="getShuffledItems()" style="flex: 1; margin-top: 0;">🎲 Shuffle All</button>
                <button class="btn-delete" onclick="emptyList()" style="flex: 1; margin-top: 0;">🗑️ Empty List</button>
            </div>
            <div id="randomPickResult" style="display: none;" class="result"></div>

            
            <div class="items-container">
                <div class="items-column">
                    <h3>Original Order</h3>
                    <div id="itemsList" class="items-list"></div>
                </div>
                <div class="items-column">
                    <h3>Shuffled Order</h3>
                    <div id="shuffledResult"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // Theme Management
        function toggleTheme() {
            const body = document.body;
            const toggle = document.getElementById('themeToggle');
            
            if (toggle.checked) {
                body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            }
        }

        // Load saved theme on page load
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const toggle = document.getElementById('themeToggle');
            
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                toggle.checked = true;
            }
        }

        // Preset lists
        const PRESET_LISTS = {
            names: ['Alex', 'Blake', 'Chris', 'Cameron', 'Dylan', 'Elliott', 'Flynn', 'Gene', 'Hunter', 'Ira', 'Jaime', 'Kai', 'Logan', 'Morgan', 'Nico', 'Ollie', 'Parker', 'Peyton', 'Quinn', 'Riley', 'Sam', 'Sarah', 'Skyler', 'Taylor', 'Uriah', 'Val', 'Wyatt', 'Xi', 'Yolanda', 'Zion'],
            phonetic: ['Alpha', 'Bravo', 'Charlie', 'Delta', 'Echo', 'Foxtrot', 'Golf', 'Hotel', 'India', 'Juliet', 'Kilo', 'Lima', 'Mike', 'November', 'Oscar', 'Papa', 'Quebec', 'Romeo', 'Sierra', 'Tango', 'Uniform', 'Victor', 'Whiskey', 'X-ray', 'Yankee', 'Zulu'],
            flavors: ['🍎 Apple', '🍊 Orange', '🍋 Lemon', '🍌 Banana', '🍉 Watermelon', '🍇 Grape', '🍓 Strawberry', '🫐 Blueberry', '🍑 Peach', '🥝 Kiwi', '🍒 Cherry', '🥑 Avocado', '🫒 Olive'],
            colors: ['🔴 Red', '🔵 Blue', '🟢 Green', '🟡 Yellow', '🟣 Purple', '🟠 Orange', '🩷 Pink', '🩵 Cyan', '⚫️ Black', '⚪️ White', '🟤 Brown', '🩶 Grey', '🌈 Rainbow'],
            planets: ['Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune'],
            animals: ['🐶 Dog', '🐱 Cat', '🐭 Mouse', '🐹 Hamster', '🐰 Rabbit', '🦊 Fox', '🐻 Bear', '🐼 Panda', '🐨 Koala', '🐯 Tiger', '🦁 Lion'],
            months: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            weekdays: ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'],
            states: ['California', 'Texas', 'Florida', 'New York', 'Pennsylvania', 'Illinois', 'Ohio', 'Georgia', 'North Carolina', 'Michigan', 'Tennessee', 'Indiana', 'Missouri', 'Maryland', 'Wisconsin', 'Colorado', 'Minnesota', 'South Carolina', 'Alabama', 'Louisiana'],
            countries: ['🇺🇸 United States', '🇨🇦 Canada', '🇲🇽 Mexico', '🇧🇷 Brazil', '🇬🇧 United Kingdom', '🇩🇪 Germany', '🇫🇷 France', '🇮🇹 Italy', '🇪🇸 Spain', '🇦🇺 Australia', '🇮🇳 India', '🇨🇳 China', '🇯🇵 Japan', '🇰🇷 Korea', '🇫🇮 Finland', '🎅 North Pole', '🇮🇪 Ireland', '🇨🇭 Switzerland', '🇮🇸 Iceland'],
            languages: ['Python', 'JavaScript', 'Java', 'C++', 'C#', 'Ruby', 'Go', 'Rust', 'TypeScript', 'Swift'],
            zodiac: ['♈ Aries', '♉ Taurus', '♊ Gemini', '♋ Cancer', '♌ Leo', '♍ Virgo', '♎ Libra', '♏ Scorpio', '♐ Sagittarius', '♑ Capricorn', '♒ Aquarius', '♓ Pisces'],
            emojis: ['😀 Grinning Face', '😂 Face with Tears of Joy', '😍 Smiling Face with Heart-Eyes', '🤔 Thinking Face', '😎 Smiling Face with Sunglasses', '😭 Loudly Crying Face', '😡 Pouting Face', '👍 Thumbs Up', '🙏 Folded Hands', '🎉 Party Popper', '👀 Eyes', '❤️ Red Heart', '🔥 Fire', '✨ Sparkles', '💯 Hundred Points', '🚀 Rocket', '⭐ Star', '💪 Flexed Biceps', '🎯 Direct Hit', '🌟 Glowing Star', '💡 Light Bulb', '🎊 Confetti Ball', '🏆 Trophy', '🎁 Wrapped Gift', '🌈 Rainbow', '😊 Smiling Face', '🤣 Rolling on the Floor Laughing', '😅 Grinning Face with Sweat', '🥰 Smiling Face with Hearts', '😘 Face Blowing a Kiss', '😜 Winking Face with Tongue', '🤗 Hugging Face', '🤩 Star-Struck', '🥳 Partying Face', '😇 Smiling Face with Halo', '🤪 Zany Face', '😴 Sleeping Face', '🤤 Drooling Face', '🙄 Face with Rolling Eyes', '😬 Grimacing Face', '🤐 Zipper-Mouth Face', '🤫 Shushing Face', '🤓 Nerd Face', '😈 Smiling Face with Horns', '👻 Ghost', '👽 Alien', '🤖 Robot', '💀 Skull', '👏 Clapping Hands', '🤝 Handshake', '✌️ Victory Hand', '🤞 Crossed Fingers', '👌 OK Hand', '✊ Raised Fist', '👊 Oncoming Fist', '🙌 Raising Hands', '💖 Sparkling Heart', '💙 Blue Heart', '💚 Green Heart', '💛 Yellow Heart', '🧡 Orange Heart', '💜 Purple Heart', '🖤 Black Heart', '🤍 White Heart', '💔 Broken Heart', '💝 Heart with Ribbon', '💘 Heart with Arrow', '☀️ Sun', '🌙 Crescent Moon', '⚡ High Voltage', '☁️ Cloud', '❄️ Snowflake', '🌸 Cherry Blossom', '🌺 Hibiscus', '🌻 Sunflower', '🌹 Rose', '🍕 Pizza', '🍔 Hamburger', '🍟 French Fries', '🌮 Taco', '🍣 Sushi', '🍩 Doughnut', '🍪 Cookie', '🎂 Birthday Cake', '🍰 Shortcake', '☕ Hot Beverage', '🍺 Beer Mug', '🎮 Video Game', '🎸 Guitar', '🎤 Microphone', '🎧 Headphone', '📱 Mobile Phone', '💻 Laptop', '⌚ Watch', '📷 Camera', '🎬 Clapper Board', '🎨 Artist Palette', '⚽ Soccer Ball', '🏀 Basketball', '🎾 Tennis', '🏈 American Football', '⚾ Baseball', '🎳 Bowling', '♠️ Spade Suit', '♥️ Heart Suit', '♦️ Diamond Suit', '♣️ Club Suit']
        };

        function escapeHtml(value) {
            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // Add preset list
        async function addPresetList(listType) {
            const items = PRESET_LISTS[listType];
            const resultDiv = document.getElementById('presetResult');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<p style="color: #6b7280;">Adding items...</p>';

            try {
                const response = await fetch(`${API_BASE}/items/bulk`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ names: items })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to add preset list');
                }

                let message = '';
                if (data.count_added > 0) message += `✓ Added ${data.count_added} item${data.count_added > 1 ? 's' : ''}. `;
                if (data.count_skipped > 0) message += `⚠️ Skipped ${data.count_skipped} duplicate${data.count_skipped > 1 ? 's' : ''}.`;

                resultDiv.className = data.count_added > 0 ? 'result success' : 'result error';
                resultDiv.innerHTML = `<p>${message || 'No items were added'}</p>`;

                if (data.count_added > 0) {
                    loadItems();
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '';
                const p = document.createElement('p');
                p.textContent = `Error: ${error.message}`;
                resultDiv.appendChild(p);
            }

            // Hide after 3 seconds
            setTimeout(() => {
                resultDiv.style.display = 'none';
            }, 3000);
        }

        // Format number with commas
        function formatNumber(num) {
            return num.toLocaleString('en-US');
        }

        // Random Number (1 to Max)
        async function getRandomNumber() {
            const maxValue = document.getElementById('maxValue').value;
            const resultDiv = document.getElementById('randomResult');
            
            // Show loading state
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<div class="processing"><div class="spinner"></div><p>Generating...</p></div>';
            
            try {
                const response = await fetch(`${API_BASE}/random/${maxValue}`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `<div class="result-number animating">${formatNumber(data.random_number)}</div>
                                          <div style="text-align: center; margin-top: 10px;">
                                          Random number between 1 and ${formatNumber(data.max)}</div>`;
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }

        // Random Number Between
        async function getRandomBetween() {
            const minValue = document.getElementById('minValue').value;
            const maxValue = document.getElementById('maxValueBetween').value;
            const resultDiv = document.getElementById('randomBetweenResult');
            
            // Show loading state
            resultDiv.className = 'result';
            resultDiv.innerHTML = '<div class="processing"><div class="spinner"></div><p>Generating...</p></div>';
            
            try {
                const response = await fetch(`${API_BASE}/random-between?min_value=${minValue}&max_value=${maxValue}`);
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `<div class="result-number animating">${formatNumber(data.random_number)}</div>
                                          <div style="text-align: center; margin-top: 10px;">
                                          Random number between ${formatNumber(data.min)} and ${formatNumber(data.max)}</div>`;
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }

        // Add Item(s)
        async function addItem() {
            const itemInput = document.getElementById('itemName').value.trim();
            const resultDiv = document.getElementById('addItemResult');
            
            if (!itemInput) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Please enter at least one item name';
                return;
            }
            
            // Split by comma and clean up each item
            const items = itemInput.split(',').map(item => item.trim()).filter(item => item.length > 0);
            
            if (items.length === 0) {
                resultDiv.className = 'result error';
                resultDiv.textContent = 'Please enter valid item names';
                return;
            }
            
            // Show processing state
            resultDiv.className = 'result';
            resultDiv.textContent = `Adding ${items.length} item${items.length > 1 ? 's' : ''}...`;
            
            try {
                const overLimit = items.find(name => name.length > 100);
                if (overLimit) {
                    throw new Error(`"${overLimit.substring(0, 20)}..." is too long (max 100 characters)`);
                }

                const response = await fetch(`${API_BASE}/items/bulk`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ names: items })
                });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Unable to add items');
                }
                
                // Show results
                let message = '';
                if (data.count_added > 0) message += `✓ Added ${data.count_added} item${data.count_added > 1 ? 's' : ''}. `;
                if (data.count_skipped > 0) message += `⚠️ Skipped ${data.count_skipped} duplicate${data.count_skipped > 1 ? 's' : ''}. `;
                
                resultDiv.className = data.count_added > 0 ? 'result success' : 'result error';
                resultDiv.textContent = message || 'No items were added';
                
                if (data.count_added > 0) {
                    document.getElementById('itemName').value = '';
                    loadItems();
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }

        // Load Items
        async function loadItems() {
            const itemsList = document.getElementById('itemsList');
            
            try {
                const response = await fetch(`${API_BASE}/items`);
                const data = await response.json();
                
                if (response.ok) {
                    if (data.original_order.length === 0) {
                        itemsList.innerHTML = '<div class="empty-state"><p>No items yet. Add some items above to get started!</p></div>';
                    } else {
                        itemsList.innerHTML = data.original_order.map(item => {
                            const safeItem = escapeHtml(item);
                            const encodedItem = encodeURIComponent(item);
                            return `
                            <div class="item">
                                <span><strong>${safeItem}</strong></span>
                                <div class="item-buttons">
                                    <button class="btn-update" data-item="${encodedItem}">✏️ Edit</button>
                                    <button class="btn-delete" data-item="${encodedItem}">🗑️ Delete</button>
                                </div>
                            </div>
                        `;
                        }).join('');

                        // Attach event listeners programmatically to avoid inline JS and injection issues
                        const itemElements = itemsList.querySelectorAll('.item');
                        itemElements.forEach(itemElement => {
                            const updateButton = itemElement.querySelector('.btn-update');
                            const deleteButton = itemElement.querySelector('.btn-delete');
                            const encodedItemName = updateButton ? updateButton.getAttribute('data-item') : null;

                            if (!encodedItemName) {
                                return;
                            }

                            const itemName = decodeURIComponent(encodedItemName);

                            if (updateButton) {
                                updateButton.addEventListener('click', () => updateItem(itemName));
                            }

                            if (deleteButton) {
                                deleteButton.addEventListener('click', () => deleteItem(itemName));
                            }
                        });
                    }
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                itemsList.innerHTML = `<p class="result error">Error loading items: ${error.message}</p>`;
            }
        }

        // Update Item
        async function updateItem(oldName) {
            const newName = prompt(`Update "${oldName}" to:`, oldName);
            
            if (!newName || newName === oldName) return;
            
            try {
                const response = await fetch(`${API_BASE}/items/${encodeURIComponent(oldName)}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name: newName })
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert(`✓ ${data.message}`);
                    loadItems();
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Delete Item
        async function deleteItem(itemName) {
            if (!confirm(`Are you sure you want to delete "${itemName}"?`)) return;
            
            try {
                const response = await fetch(`${API_BASE}/items/${encodeURIComponent(itemName)}`, {
                    method: 'DELETE'
                });
                const data = await response.json();
                
                if (response.ok) {
                    alert(`✓ ${data.message}`);
                    loadItems();
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Pick Random Item
        async function pickRandomItem() {
            const resultDiv = document.getElementById('randomPickResult');
            
            try {
                const response = await fetch(`${API_BASE}/items`);
                const data = await response.json();
                
                if (response.ok) {
                    if (data.count === 0) {
                        resultDiv.style.display = 'block';
                        resultDiv.className = 'result error';
                        resultDiv.innerHTML = '<p>No items available. Add some items first!</p>';
                    } else {
                        // Pick a random item
                        const randomIndex = Math.floor(Math.random() * data.original_order.length);
                        const pickedItem = data.original_order[randomIndex];
                        
                        resultDiv.style.display = 'block';
                        resultDiv.className = 'result success';
                        resultDiv.innerHTML = `
                            <div class="random-pick-result animating">${pickedItem}</div>
                            <p style="text-align: center; color: var(--text-muted);">Randomly selected from ${data.count} item${data.count > 1 ? 's' : ''}</p>
                        `;
                    }
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }

        // Get Shuffled Items
        async function getShuffledItems() {
            const resultDiv = document.getElementById('shuffledResult');
            
            // Show loading state
            resultDiv.innerHTML = '<div class="shuffling-indicator"><div class="shuffle-spinner"></div><p>Shuffling items...</p></div>';
            
            try {
                const response = await fetch(`${API_BASE}/items`);
                const data = await response.json();
                
                if (response.ok) {
                    if (data.count === 0) {
                        resultDiv.innerHTML = '<div class="empty-state"><p>No items to shuffle yet!</p></div>';
                    } else {
                        resultDiv.innerHTML = `
                            <div class="items-list">
                                ${data.randomized_order.map((item, index) => `
                                    <div class="item shuffle-animate" style="animation-delay: ${index * 0.05}s">
                                        <span><strong>${index + 1}. ${escapeHtml(item)}</strong></span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                } else {
                    throw new Error(data.detail);
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="result error">Error: ${error.message}</p>`;
            }
        }

        // Empty List - Delete all items
        async function emptyList() {
            try {
                const response = await fetch(`${API_BASE}/items`);
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail);
                }

                if (data.original_order.length === 0) {
                    alert('The list is already empty!');
                    return;
                }

                if (!confirm(`Are you sure you want to delete all ${data.original_order.length} items?`)) {
                    return;
                }

                const deleteResponse = await fetch(`${API_BASE}/items`, {
                    method: 'DELETE'
                });
                const deleteData = await deleteResponse.json();

                if (!deleteResponse.ok) {
                    throw new Error(deleteData.detail || 'Unable to clear list');
                }

                alert(`✓ Successfully deleted all ${deleteData.deleted_count} items!`);

                loadItems();
                document.getElementById('shuffledResult').innerHTML = '';
            } catch (error) {
                alert(`Error: ${error.message}`);
            }
        }

        // Load items and theme on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            loadItems();
        });
    </script>
</body>
</html>
